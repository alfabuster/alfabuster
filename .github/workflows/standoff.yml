name: Update Standoff365 Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate SVG
        # Прокидываем секрет как переменную окружения
        env:
          STANDOFF_TOKEN: ${{ secrets.STANDOFF_TOKEN }}
        run: python generate_stats.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add standoff_badge.svg
          git commit -m "chore: update Standoff365 stats [skip ci]" || exit 0
          git push
