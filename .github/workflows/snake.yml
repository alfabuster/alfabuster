name: Generate Snake Animation

on:
  # Запуск по расписанию (каждый день в полночь)
  schedule:
    - cron: "0 0 * * *"
  # Позволяет запускать экшен вручную из интерфейса GitHub
  workflow_dispatch:
  # Запуск при каждом пуше в ветку main (можешь закомментировать, если не нужно)
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Генерация змейки из твоего графика коммитов
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Пуш сгенерированных файлов в ветку 'output'
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
